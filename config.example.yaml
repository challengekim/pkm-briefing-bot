# PKM Briefing Bot Configuration
# Copy this file to config.yaml and fill in your values.
# Secrets (API keys, tokens) go in .env — see .env.example

language: ko  # ko | en — controls AI prompt language

# LLM Provider — choose one:
#   gemini     — Google Gemini (free tier: 1,500 req/day)
#   openrouter — 100+ models from all providers (some free)
#   openai     — OpenAI GPT models
#   anthropic  — Anthropic Claude models
#   ollama     — Local models (100% free, requires Ollama)
llm:
  provider: gemini
  # model: gemini-2.5-flash                              # gemini (default)
  # model: google/gemini-2.5-flash-preview-05-20:free    # openrouter free
  # model: gpt-4o-mini                                   # openai
  # model: claude-haiku-4-5-20251001                     # anthropic
  # model: llama3.1:8b                                   # ollama
  # base_url: http://localhost:11434/v1                  # ollama or custom

# language_patterns: (auto-detected from language setting — usually no need to change)
# action_required: regex to extract action items from AI output
# none_value: sentinel value meaning "none" in AI output
# Defaults: ko → "액션 필요" / "없음", en → "Action Required" / "None"

vault:
  path: ~/Documents/my-knowledge
  scan_paths:
    - 10_Knowledge/References/AI Engineering
    - 10_Knowledge/References/AI Tools
    - 10_Knowledge/References/Business
    - 10_Knowledge/References/Engineering
    - 10_Knowledge/References/Marketing
    - 00_Inbox/Read Later
  ideas_file: "20_Projects/AI Ideas/project-ideas.md"

accounts:
  personal:
    display_name: "Personal"
    newsletter_senders:
      - "Lenny"
      - "Superhuman"
  work:
    display_name: "Work"
    label: "important"
    skip_keywords:
      - "OTP"
      - "verification"
      - "password reset"
      - "unsubscribe"

projects:
  - name: "My Project"
    description: "Brief description of what this project does"
    repo_path: ~/projects/my-project

notifications:
  email_to: you@example.com

trends:
  subreddits: [artificial, MachineLearning, LocalLLaMA, singularity, ChatGPT]
  hn_limit: 15
  reddit_limit: 8
  geeknews_limit: 10

schedule:
  timezone: Asia/Seoul
  morning: "08:00"
  trend: "10:00"
  linkedin: "11:30"
  evening: "17:00"
  weekly: "fri 18:00"
  knowledge: "sat 10:00"
  meta: "1st 11:00"

# Agent mode (Phase A: Reactive, Phase B: Proactive, Phase C: Self-Improving)
agent:
  mode: disabled        # disabled | reactive | proactive | self-improving
  autonomy: medium      # low (always ask) | medium (act + report) | high (full auto)
  state_path: ~/.compound-brain/state.json
  memory_path: ~/.compound-brain/memory.json  # proactive+ mode memory
  # Proactive mode settings
  suggestion_cooldown_hours: 24   # min hours between proactive suggestions
  gap_detection_days: 5           # days without saves to trigger category gap alert
  min_reading_samples: 5          # min samples before adjusting send times
  ema_alpha: 0.2                  # preference learning rate (0.0-1.0, higher = faster adaptation)
  # Self-improving mode settings (Phase C)
  # max_config_changes_per_month: 3   # rate limit: config adjustments per month
  # max_prompt_mutations_per_week: 1  # rate limit: prompt experiments per week
  # engagement_drop_threshold: 0.5    # rollback if engagement drops below 50% of baseline
  # evolution_log_path: ~/.compound-brain/evolution-log.json
  # variants_path: ~/.compound-brain/prompts/variants

# Multi-Agent System (Phase D)
